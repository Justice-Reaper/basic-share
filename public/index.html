<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>BasicShare</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

</head>
<body>

  <!-- ══════════════════════ LOGIN SCREEN ══════════════════════ -->
  <div id="login-screen" class="screen">
    <div class="login-container">

      <div class="logo-block">
        <div class="logo-badge">BF</div>
        <h1>BasicShare</h1>
        <p class="tagline">Quick access to your club</p>
      </div>

      <div class="login-form">
        <div class="login-hint">
          <p class="login-hint-title">Steps to follow</p>
          <ol>
            <li>If you are already logged in, click <a href="https://my.basic-fit.com" target="_blank" rel="noopener" class="link-orange">my.basic-fit.com</a> and log out</li>
            <li>Click the button below and follow the instructions</li>
          </ol>
        </div>

        <button id="btn-oauth" class="btn-primary btn-full">Log in via OAuth</button>
      </div>

      <div id="login-message" class="login-message" style="display:none"></div>

      <div id="oauth-paste-panel" class="oauth-paste-panel" style="display:none">
        <div class="oauth-steps">
          <p class="oauth-steps-title">In the popup:</p>
          <ol id="oauth-steps-list">
          </ol>
        </div>
        <input id="oauth-paste-input"
               type="url"
               inputmode="url"
               placeholder="com.basicfit.bfa:/oauthredirect?code=..."
               autocomplete="off"
               spellcheck="false"
               class="paste-input" />
        <button id="btn-paste-submit" class="btn-primary btn-full">Connect</button>
      </div>

    </div>
  </div>

  <!-- ══════════════════════ DASHBOARD SCREEN ══════════════════════ -->
  <div id="dashboard-screen" class="screen">
    <div class="dashboard-container">

      <header class="dash-header">
        <div>
          <h2>My Club</h2>
          <p id="membership-type" class="dash-club" style="display:none"></p>
          <p id="extras-text" class="dash-club" style="display:none"></p>
          <p id="last-visit-text" class="dash-club" style="display:none"></p>
          <div id="cooldown-bar-container" class="cooldown-container" style="display:none">
            <div class="cooldown-track">
              <div id="cooldown-fill" class="cooldown-fill"></div>
            </div>
            <p id="cooldown-text" class="cooldown-text"></p>
          </div>
        </div>
      </header>

      <button id="btn-show-qr" class="qr-card">
        <div class="qr-card-icon">📱</div>
        <div class="qr-card-text">
          <span class="qr-card-title">QR Code</span>
          <span class="qr-card-subtitle">Enter the gym and use the massage chair</span>
        </div>
        <div class="qr-card-arrow">›</div>
      </button>

      <button id="btn-logout" class="btn-primary btn-full">Log out</button>

    </div>
  </div>

  <!-- ══════════════════════ QR CODE MODAL ══════════════════════ -->
  <div id="qr-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-label="QR Code">

      <button id="btn-close-qr" class="modal-close" aria-label="Close">✕</button>

      <h2 class="modal-title">QR Code</h2>
      <p class="modal-subtitle">Enter the gym and use the massage chair</p>

      <div class="qr-wrapper">
        <div class="qr-border">
          <img id="qr-img" width="240" height="240" alt="QR Code" />
        </div>
      </div>

      <div class="progress-track">
        <div id="qr-progress" class="progress-fill"></div>
      </div>

      <p id="qr-card-label" class="qr-card-number">Card —</p>

    </div>
  </div>

  <!-- ══════════════════════ LOADING OVERLAY ══════════════════════ -->
  <div id="loading-overlay" class="loading-overlay" aria-live="polite">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
